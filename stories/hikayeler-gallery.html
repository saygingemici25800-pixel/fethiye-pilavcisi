    background: #1FB6C1; color: #0A1418;

    border-radius: 4px; cursor: pointer; font-family: inherit;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 36px;

  .card {
    display: flex; flex-direction: column; gap: 14px;

  .card-meta { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }

  .card-title {

  .card-why {
    font-size: 13px; color: rgba(245,237,216,0.55); line-height: 1.5;

    width: 100%; aspect-ratio: 9 / 16;
    position: relative; overflow: hidden;
    background: #000;
    box-shadow: 0 20px 50px -15px rgba(0,0,0,0.5);
    border-radius: 8px;
  }
  .stage-inner {
    width: 1080px; height: 1920px;
    transform-origin: top left;
    position: absolute; top: 0; left: 0;
  }

  .card-actions { display: flex; gap: 8px; }
  .card-actions button {
    flex: 1;
    background: rgba(245,237,216,0.08);
    color: #F5EDD8;
    border: 1px solid rgba(245,237,216,0.18);

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

const STORIES = [
  { id: 'davet',   num: '01', label: 'Çarpıcı / Davet',  title: 'BUGÜN PİLAV GÜNÜ', why: 'Tek karede saat ve mekân. Dikkat yakalar, yön verir.', Comp: Story1 },
  { id: 'soz',     num: '02', label: 'Dürüst / Söz',     title: 'DÜNDEN KALAN PİLAV YOK', why: '"Yapmıyoruz" listesi — söz vererek güven kurar.', Comp: Story2 },
  { id: 'yorum',   num: '03', label: 'Sosyal Kanıt',     title: 'BUGÜNÜN YORUMU', why: 'Tek müşteri sözünü dev gibi büyütür. Markaya 3. ağız konuşturur.', Comp: Story3 },
  { id: 'mutfak',  num: '04', label: 'Behind-the-Scenes', title: 'ŞU AN 08:30', why: 'Sabah saatini canlı yayın gibi paylaşır. "Tazeyiz" demeden gösterir.', Comp: Story4 },
  { id: 'sadakat', num: '05', label: 'Sadakat Kartı',    title: '10 PİLAV / 1 BEDAVA', why: 'Görsel ilerleme + sıfır sürtünme. Yeni müşteriyi müdaviye çağırır.', Comp: Story5 },
  { id: 'menu',    num: '06', label: 'Bilgilendirici / Menü', title: 'BUGÜN TEZGÂHTA', why: 'Fiyat şeffaflığı. Karar verdirir, kapıdan çevirmez.', Comp: Story6 },
];

const App = () => {
  const refs = React.useRef({});
  const [downloading, setDownloading] = React.useState(null);

  const downloadOne = async (id) => {
    setDownloading(id);
    const target = refs.current[id];
    const inner = target.parentElement;
    const prevTransform = inner.style.transform;
    inner.style.transform = 'scale(1)';
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 100));
    try {
      const dataUrl = await htmlToImage.toPng(target, {
        width: 1080, height: 1920, pixelRatio: 2, cacheBust: true,
      });
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `fethiye-hikaye-${id}.png`;
      a.click();
    } catch (e) {
      console.error(e);
      alert('İndirme hatası: ' + e.message);
    } finally {
      inner.style.transform = prevTransform;
      setDownloading(null);
    }
  };

  const downloadAll = async () => {
    for (const s of STORIES) {
      await downloadOne(s.id);
      await new Promise(r => setTimeout(r, 400));
    }
  };

  React.useEffect(() => {
    document.getElementById('dl-all').addEventListener('click', downloadAll);
    const rescale = () => {
      Object.entries(refs.current).forEach(([id, el]) => {
        if (!el) return;
        const stage = el.parentElement.parentElement;
        const w = stage.getBoundingClientRect().width;
        el.parentElement.style.transform = `scale(${w / 1080})`;
        stage.style.height = `${(w / 9) * 16}px`;
      });
    };
    window.addEventListener('resize', rescale);
    setTimeout(rescale, 100);
  }, []);

  return (
    <>
      {STORIES.map((s) => (
        <div key={s.id} className="card">
          <div className="card-meta">
            <span className="num">{s.num}</span>
            <span className="label">{s.label}</span>
          </div>
          <h3 className="card-title">{s.title}</h3>
          <div className="stage">
            <div className="stage-inner">
              <div ref={(el) => refs.current[s.id] = el}>
                <s.Comp />
              </div>
            </div>
          </div>
          <div className="card-why">{s.why}</div>
          <div className="card-actions">
            <button className="primary" onClick={() => downloadOne(s.id)} disabled={downloading === s.id}>
              {downloading === s.id ? 'İndiriliyor…' : '⬇ PNG İndir'}
            </button>
          </div>
        </div>
      ))}
    </>
  );
};

// ?only=<id> → render ONE story full-bleed at 1080x1920 (for Chrome-headless PNG export).
// No param → normal interactive gallery.
const __only = new URLSearchParams(location.search).get('only');
const __byId = Object.fromEntries(STORIES.map((s) => [s.id, s.Comp]));
if (__only && __byId[__only]) {
  const Comp = __byId[__only];
  document.documentElement.style.background = '#000';
  document.body.style.margin = '0';
  document.body.innerHTML = '';
  const host = document.createElement('div');
  host.id = 'only-root';
  host.style.cssText = 'width:1080px;height:1920px;overflow:hidden;position:absolute;top:0;left:0;';
  document.body.appendChild(host);
  ReactDOM.createRoot(host).render(<Comp />);
} else {
  ReactDOM.createRoot(document.getElementById('gallery')).render(<App />);
}
</script>

</body>
</html>
