<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Sadakat Kartı · Arka Yüz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== SHARED TOKENS (identical on both faces) ===== */
  :root{
    --cream:#FAF8F3; --ink:#1A1A1A; --cyan:#00B4C8;
    --font-display:'Fraunces', serif;
    --font-body:'DM Sans', system-ui, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  html,body{ margin:0; padding:0; background:#d8d8d2; }
  body{ font-family:var(--font-body); color:var(--ink); font-feature-settings:'ss01','liga'; }

  /* ===== SHARED TYPE SYSTEM (identical on both faces) ===== */
  .t-display{ font-family:var(--font-display); font-style:italic; font-weight:400;
    font-optical-sizing:none; font-variation-settings:'opsz' 144,'wght' 400; letter-spacing:-0.01em; }
  .t-display-roman{ font-family:var(--font-display); font-style:normal; font-weight:400;
    font-optical-sizing:none; font-variation-settings:'opsz' 144,'wght' 400; letter-spacing:-0.01em; }
  .t-sub{ font-family:var(--font-display); font-style:italic; font-weight:400;
    font-optical-sizing:none; font-variation-settings:'opsz' 36,'wght' 400; }
  .t-label{ font-family:var(--font-body); font-weight:500; text-transform:uppercase; letter-spacing:0.2em; }
  .t-num{ font-family:var(--font-display); font-style:normal; font-weight:400;
    font-optical-sizing:none; font-variation-settings:'opsz' 144,'wght' 400;
    font-feature-settings:'tnum' 1,'lnum' 1; }
  .t-body{ font-family:var(--font-body); font-weight:400; letter-spacing:0; }
  .t-edge{ font-family:var(--font-body); font-weight:500; text-transform:uppercase; letter-spacing:0.3em; }

  /* ===== SHARED LOGO LOCKUP (identical on both faces) ===== */
  .logo{ display:flex; align-items:center; gap:13px; }
  .logo .mark{ display:block; }
  .logo .wm{ line-height:.92; }
  .logo .wm .a{ font-family:var(--font-display); font-style:italic; font-weight:400;
    font-variation-settings:'opsz' 36,'wght' 400; font-size:22px; opacity:.9; letter-spacing:.3px; }
  .logo .wm .b{ font-family:var(--font-body); font-weight:700; font-size:24px; letter-spacing:3px; }

  /* ===== LAYOUT — BACK ===== */
  .card{ position:relative; width:1004px; height:650px; background:var(--cream); color:var(--ink); overflow:hidden; }
  .trim{ position:absolute; inset:0; pointer-events:none; z-index:50; border:1.5px dashed var(--cyan); opacity:.55; }
  .printing .trim{ display:none; }
  @media print{ .trim{ display:none; } }

  .side{ position:absolute; left:0; top:0; bottom:0; width:62px; display:flex; align-items:center; justify-content:center; }
  .side span{ transform:rotate(-90deg); white-space:nowrap; font-size:16px; opacity:.5; }

  /* LEFT content zone (~%57) */
  .col{ position:absolute; left:88px; right:534px; top:44px; bottom:54px; display:flex; flex-direction:column; justify-content:flex-start; z-index:1; }

  .back-top{ display:flex; flex-direction:column; align-items:flex-start; gap:14px; }
  .hashtag{ font-family:'IBM Plex Mono', ui-monospace, monospace; font-size:15px; font-weight:500; color:var(--ink); letter-spacing:-.5px; margin-top:-2px; }
  .hashtag .hash{ color:var(--cyan); }

  .purpose{ font-size:19px; line-height:1.4; margin-top:32px; }
  .purpose .c{ color:var(--cyan); }
  .purpose .lead{ font-style:normal; font-variation-settings:'opsz' 36,'wght' 500; }

  .phone{ text-align:left; align-self:flex-start; margin-top:32px; }
  .phone .num{ font-size:53px; }
  .phone .rule{ width:100%; height:1.5px; background:var(--cyan); margin:6px 0 0; }
  .phone-cap{ font-size:13px; margin-top:19px; letter-spacing:.2px; }

  .foot{ margin-top:auto; }
  .addr{ font-size:21px; line-height:1.5; }
  .addr-hook{ font-size:16px; letter-spacing:.2px; margin-bottom:24px; }
  .addr .h{ opacity:.85; }
  .addr .ig{ color:var(--ink); display:inline-flex; align-items:center; gap:6px; }
  .addr .ig .igicon{ color:var(--ink); flex:none; }

  /* RIGHT zone — big QR (~35mm) */
  .qr-big{ position:absolute; right:56px; top:74px; width:410px; height:410px; background:var(--cream); z-index:2; }
  .qr-big svg{ width:100%; height:100%; display:block; }

  /* MENÜ under the QR, same width; QR overlaps its top ~25% (QR on top via z-index) */
  .menu-text{ position:absolute; left:538px; right:56px; top:390px; z-index:1; line-height:0; }
  .menu-text svg{ display:block; width:100%; height:auto; }

  /* ===== PRINT / PDF — 91x61mm page (85x55mm trim + 3mm bleed her yön) ===== */
  @page { size: 91mm 61mm; margin: 0; }
  @media print {
    html, body { width:91mm; height:61mm; overflow:hidden; background:var(--cream); }
    body { display:flex; align-items:center; justify-content:center; }
    .card { zoom:0.32; }
    .trim { display:none; }
  }
</style>
</head>
