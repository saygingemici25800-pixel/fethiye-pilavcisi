<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fethiye Pilavcısı — QR Sticker A6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  /* A6 trim 105 x 148 mm, with 3mm bleed all sides → bleed canvas 111 x 154 mm */
  @page {
    size: 111mm 154mm;
    margin: 0;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#D7CFB9;
    font-family:'DM Sans', system-ui, sans-serif;
    color:#1A1A1A;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px 0;
  }

  .bleed {
    width:111mm;
    height:154mm;
    background:#FAF8F3;
    position:relative;
    overflow:hidden;
  }

  .trim-guide{
    position:absolute;
    top:3mm; left:3mm; right:3mm; bottom:3mm;
    border:1px dashed rgba(0,180,200,0.25);
    pointer-events:none;
  }
  @media print {
    .trim-guide{ display:none; }
    html, body{ background:#FAF8F3; padding:0; min-height:auto; }
  }

  .card {
    position:absolute;
    top:3mm; left:3mm;
    width:105mm;
    height:148mm;
    padding:9mm 9mm 8mm;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .accent-top{
    width:14mm;
    height:0.6mm;
    background:#00B4C8;
    margin-bottom:5mm;
  }

  .logo svg{
    display:block;
    height:14mm;
    width:auto;
  }

  .heading-tr{
    margin-top:8mm;
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size:11pt;
    letter-spacing:-0.01em;
    color:#1A1A1A;
    line-height:1.2;
  }

  .qr-wrap{
    margin-top:5mm;
    padding:4mm;
    background:#FAF8F3;
    border:0.4mm solid #00B4C8;
    border-radius:1mm;
    position:relative;
  }
  .qr-wrap::before,
  .qr-wrap::after,
  .qr-wrap > .ct, .qr-wrap > .cb{
    content:"";
    position:absolute;
    width:3mm; height:3mm;
    border:0.4mm solid #00B4C8;
  }
  .qr-wrap::before{ top:-1.4mm; left:-1.4mm; border-right:0; border-bottom:0; }
  .qr-wrap::after { top:-1.4mm; right:-1.4mm; border-left:0; border-bottom:0; }
  .qr-wrap > .ct  { bottom:-1.4mm; left:-1.4mm; border-right:0; border-top:0; }
  .qr-wrap > .cb  { bottom:-1.4mm; right:-1.4mm; border-left:0; border-top:0; }

  .qr-wrap svg{
    display:block;
    width:62mm;
    height:62mm;
    shape-rendering:crispEdges;
    image-rendering:pixelated;
  }

  .caption-en{
    margin-top:4mm;
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:300;
    font-size:9pt;
    color:#1A1A1A99;
    letter-spacing:0.02em;
  }

  .spacer{ flex:1; }

  .brandline{
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size:13pt;
    letter-spacing:0.02em;
    color:#1A1A1A;
    margin-bottom:3mm;
  }
  .url-line{
    font-family:'DM Sans', sans-serif;
    font-size:7.5pt;
    font-weight:500;
    letter-spacing:1.4px;
    text-transform:uppercase;
    color:#00B4C8;
  }

  /* Crop marks (screen only) */
  .crop{
    position:absolute;
    width:4mm; height:4mm;
    pointer-events:none;
  }
  .crop::before, .crop::after{
    content:""; position:absolute; background:#1A1A1A33;
  }
  .crop::before{ width:0.2mm; height:3mm; }
  .crop::after { height:0.2mm; width:3mm; }
  .crop.tl{ top:0; left:0; }
  .crop.tl::before{ top:0; left:3mm; }
  .crop.tl::after { top:3mm; left:0; }
  .crop.tr{ top:0; right:0; }
  .crop.tr::before{ top:0; right:3mm; }
  .crop.tr::after { top:3mm; right:0; }
  .crop.bl{ bottom:0; left:0; }
  .crop.bl::before{ bottom:0; left:3mm; }
  .crop.bl::after { bottom:3mm; left:0; }
  .crop.br{ bottom:0; right:0; }
  .crop.br::before{ bottom:0; right:3mm; }
  .crop.br::after { bottom:3mm; right:0; }
  @media print {
    .crop{ display:none; }
  }
</style>
</head>
<body>

<div class="bleed">

  <div class="crop tl"></div>
  <div class="crop tr"></div>
  <div class="crop bl"></div>
  <div class="crop br"></div>

      </svg>
    </div>

    <div class="caption-en">Scan to view menu</div>

    <div class="spacer"></div>
